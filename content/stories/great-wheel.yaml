      - src: "/images/great-wheel/IMG_8273.webp"
        caption: "Day 2 — open tundra travel"
      - src: "/images/great-wheel/IMG_8319.webp"
        caption: "The valley widening to the east"
      - src: "/images/great-wheel/IMG_8277.webp"
        caption: "Late afternoon light on the ridgeline"

  - id: day3-climb
    type: map
    heading: "Climbing"
    subheading: "July 21 — 905m"
    text: |
      We left camp at six in the morning with empty stomachs and made 900 meters by noon. The ridge above camp was loose shale and then solid granite, then nothing — just sky and a view that stretched sixty miles in every direction.

      A Dall sheep watched us from fifty meters, completely unbothered. We were the oddity here.
    coordinates: [-155.060, 67.709]
    zoom: 11
    pitch: 50
    bearing: -30
    routeProgress: 0.32
    marker: true
    align: right

  - id: day3-gallery
    type: gallery
    layout: duo
    images:
      - src: "/images/great-wheel/IMG_8330.webp"
        caption: "At 905m — the first significant climb of the route"
      - src: "/images/great-wheel/IMG_8336.webp"
        caption: "The descent route back into the valley"

  - id: camp
    type: map
    heading: "River Camp"
    subheading: "July 23 — Day 5"
    text: |
      The camp was on a gravel bar where a small tributary joined the main drainage. We stayed two nights — the weather had turned grey and the mosquitoes were thick enough that nobody wanted to pack up in the rain.

      It was the right call. The second night the skies cleared and we had the best fire of the trip.
    coordinates: [-154.416, 67.628]
    zoom: 12
    pitch: 35
    bearing: 15
    routeProgress: 0.46
    marker: true
    align: left

  - id: camp-article
    type: article
    blocks:
      - text: |
          ## Days Four and Five

          The layover gave us time to scout. We split up — two people upstream to look at the drainage we'd come down, two people downstream to understand what the next two days would bring. Both parties came back with the same report: technical terrain, no shortcuts.
      - image: "/images/great-wheel/IMG_8345.webp"
        caption: "Camp on day five — two-night stay on the gravel bar"
        align: right
      - text: |
          The evening of day five was the clearest night of the trip. No wind, no clouds, the sun circling low over the ridge to the north. We stayed up too late talking about the route ahead — a long descending traverse to a high ridge we could see from camp but couldn't yet read.

          Someone spotted a wolf on the far bank just before midnight. By the time we all turned around, it was gone.
      - image: "/images/great-wheel/IMG_8362.webp"
        caption: "Morning of day six — breaking camp"
        align: left

  - id: day6
    type: map
    heading: "Long Miles"
    subheading: "July 24 — Day 6"
    text: |
      The valley widened and the route became easier — we were following actual running water now, which meant no compass navigation and faster ground. Eighteen kilometers in seven hours.

      The map showed a significant ridge ahead. We made camp early to get a full night before the push.
    coordinates: [-154.143, 67.555]
    zoom: 10
    pitch: 35
    bearing: 35
    routeProgress: 0.60
    align: right

