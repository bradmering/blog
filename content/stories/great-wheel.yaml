      - src: "/images/great-wheel/IMG_8472.webp"
        caption: "Last look from the ridge"
      - src: "/images/great-wheel/IMG_8510.webp"
        caption: "The descent — picking a line through the scree"
      - src: "/images/great-wheel/IMG_8529.webp"
        caption: "Back on the valley floor"

  - id: journey-end
    type: map
    heading: "Journey's End"
    subheading: "July 26 — 67.4°N, 220m"
    text: |
      The last day was eight hours of easy valley travel, following the drainage south to the extraction strip. We heard the plane before we saw it — that distant buzz that meant the week was over.

      The pilot banked over the ridge on the way out and we looked down at the route we'd just walked, **an eight-day arc through wilderness that doesn't have a name for most of it**.
    coordinates: [-153.672, 67.380]
