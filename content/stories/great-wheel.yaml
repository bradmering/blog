chapters:
  - id: title
    type: title
    heading: "The Great Wheel"
    subheading: "Eight days in Gates of the Arctic National Park"
    image: "/images/great-wheel/IMG_8396.webp"
    text: |
      Eight days in a wilderness that doesn't have names for most of it. We flew into Gates of the Arctic from Fairbanks — a Cessna, a gravel bar, and four words from the pilot when he unloaded the packs: *see you in eight days*.

      What followed was a counter-clockwise arc through the central Brooks Range: northeast up a nameless drainage, over a 1,157-meter ridge, then south and west back to the extraction strip. We called it the Great Wheel.

  - id: fairbanks
    type: map
    heading: "Fairbanks"
    subheading: "July 19 — Staging"
    text: |
      Fairbanks in July is a disorienting place to start a wilderness trip. Thirty-two degrees, mosquitoes, strip malls. We spread maps across the hood of a rental truck in a parking lot behind Fred Meyer and tried to translate weeks of planning into what actually fit in five dry bags.

      The flight north left at six in the morning.
    coordinates: [-147.852, 64.809]
    zoom: 11
    pitch: 0
    bearing: 0
    align: left

  - id: fairbanks-gallery
    type: gallery
    layout: duo
    images:
      - src: "/images/great-wheel/IMG_8164.webp"
        caption: "Fairbanks staging — gear check before the flight north"
      - src: "/images/great-wheel/IMG_8177.webp"
        caption: "The Cessna that would take us into the park"

  - id: drop-in
    type: map
    heading: "The Drop-In"
    subheading: "July 19 — 67.7°N, 545m"
    text: |
      The Cessna banked hard left and the valley opened below us — a long drainage running northeast from peaks we hadn't named yet. The pilot set us down on a gravel bar, engine still ticking as he unloaded packs, and left us with four words: *see you in eight days*.

      We watched the plane until we couldn't hear it anymore.
    coordinates: [-155.416, 67.663]
    zoom: 10
    pitch: 45
    bearing: -10
    routeProgress: 0.02
    marker: true
    align: right

  - id: drop-in-gallery
