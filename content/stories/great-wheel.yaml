  - id: high-ridge
    type: map
    heading: "The High Ridge"
    subheading: "July 25 — 1,157m"
    text: |
      The summit was a false flat — you crested what looked like the top and then walked another two hundred meters to the actual high point. The panorama was complete in every direction. Nothing between us and the horizon but air.

      We sat there for an hour. Nobody had any desire to go back down.
    coordinates: [-153.946, 67.470]
