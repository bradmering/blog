      - src: "/images/great-wheel/IMG_8234.webp"
        caption: "The drop-in gravel bar — our first camp"
      - src: "/images/great-wheel/IMG_8256.webp"
        caption: "Looking east into the drainage we'd follow for two days"

  - id: day2
    type: map
    heading: "Moving East"
    subheading: "July 20 — Day 2"
    text: |
      The first full day was compass and tussock. We weren't on a river yet, just crossing open ground in the direction we needed to go. The terrain was harder than the map suggested — tussocks two feet high in every low spot, unstable and exhausting under a heavy pack.

      By afternoon the drainage narrowed and the walking improved. We made camp on a gravel bar beside a creek cold enough to numb your hands in thirty seconds.
    coordinates: [-155.141, 67.668]
    zoom: 11
    pitch: 40
    bearing: 20
    routeProgress: 0.22
    marker: true
    align: left

  - id: day2-gallery
    type: gallery
