chapters:
  - id: title
    type: title
    heading: "Packrafting around the Arrigatch"
    subheading: "Eight days in Gates of the Arctic National Park"
    image: "/images/great-wheel/IMG_8396.webp"
    text: |
      Eight days in a wilderness that doesn't have names for most of it. We flew into Gates of the Arctic from Fairbanks — a Twin Otter. Landing on a oxbow lake, the river having abandoned its channel, we unloaded and set off up and over the ridge.

      What followed was a counter-clockwise arc through the central Brooks Range: northeast up a nameless drainage, over a the divide, and then inflating the rafts, paddling down the Alatna river.  

      We paused at the confluence of the Alatna and Arrigetch creek, and hiked up the drainage towards the towering peaks. We camped for a night high in the valley, and then creeked back down to the now large river.  

  - id: fairbanks
    type: map
    heading: "Fairbanks"
    subheading: "July 19 — Staging"
    text: |
      I like Fairbanks. Perched on the edge of a lot of wilderness, lots of interesting people. We spent the day organizing gear, and shopping for food.
    coordinates: [-147.852, 64.809]
    zoom: 11
    pitch: 0
    bearing: 0
    align: left

  - id: fairbanks-gallery
    type: gallery
    layout: duo
    images:
      - src: "/images/great-wheel/IMG_8164.webp"
        caption: "Pictures of the map"
      - src: "/images/great-wheel/IMG_8177.webp"
        caption: "Me with a bear sticker"

  - id: drop-in
    type: map
    heading: "The Drop-In"
    subheading: "July 19 — 67.7°N, 545m"
    text: |
      The Cessna banked hard left and the valley opened below us. The pilot set us down on the water, and we unloaded the gear. We watched the plane until we couldn't hear it anymore. The silence that follows, in the vast, trackless wilderness is wonderful.
    coordinates: [-155.416, 67.663]
    zoom: 10
    pitch: 45
    bearing: -10
    routeProgress: 0.02
    marker: true
    align: right

  - id: drop-in-gallery
    type: gallery
    layout: duo
    images:
      - src: "/images/great-wheel/IMG_8234.webp"
        caption: "A twin otter parked in the water"
      - src: "/images/great-wheel/IMG_8256.webp"
        caption: "Starting up the towards the divide"

  - id: day2
    type: map
    heading: "Moving East"
    subheading: "July 20 — Day 2"
    text: |
      The first full day was compass and tussock. Overland travel is much harder than the miles or elevation would suggest. The permafrost melts on the top, and creates tussocks a foot or two high, often with mud and water underneath. Carrying 60lbs of gear, foot, rafts and drysuits makes for a slow day.

      By afternoon the drainage narrowed and the walking improved. We forded several streams, and made camp on a gravel bar beside a creek cold enough to numb your hands in thirty seconds.
    coordinates: [-155.141, 67.668]
    zoom: 11
    pitch: 40
    bearing: 20
    routeProgress: 0.22
    marker: true
    align: left

  - id: day2-gallery
    type: gallery
    layout: trio
    images:
      - src: "/images/great-wheel/IMG_8273.webp"
        caption: "Sagar and Sarah crossing a river"
      - src: "/images/great-wheel/IMG_8319.webp"
        caption: "Mark exploring a rad slot canyon"
      - src: "/images/great-wheel/IMG_8277.webp"
        caption: "Wolf tracks in th emud"

  - id: day3-climb
    type: map
    heading: "Climbing"
    subheading: "July 21 — 905m"
    text: |
      We climbed up the ridge above camp to the divide. Beautiful mountain lakes beaconed, so Mark, Liz and I jumped in.  Then we started a long descent down the divide to the Alatna River.
    coordinates: [-155.060, 67.709]
    zoom: 11
    pitch: 50
    bearing: -30
    routeProgress: 0.32
    marker: true
    align: right

  - id: day3-gallery
    type: gallery
    layout: duo
    images:
      - src: "/images/great-wheel/IMG_8330.webp"
        caption: "At 905m — the first significant climb of the route"
      - src: "/images/great-wheel/IMG_8336.webp"
        caption: "First View of the Atlana River"

  - id: camp
    type: map
    heading: "River Camp"
    subheading: "July 23 — Day 5"
    text: |
      We camped on a plateau above the river, watching a solitary black wolf race up the river below us. The river was narrow, fast and tree lined. The river was riskier than the class II grade would suggest with significant entrapment risk, and low sweepers.

      It was exciting to be on the river, but the first day on the river was stressful and dangerous.
    coordinates: [-154.416, 67.628]
    zoom: 12
    pitch: 35
    bearing: 15
    routeProgress: 0.46
    marker: true
    align: left

  - id: camp-article
    type: gallery
    layout: duo
    images: 
      - src: "/images/great-wheel/IMG_8345.webp"
        caption: "Camping on the gravel bar"
      - src: "/images/great-wheel/IMG_8362.webp"
        caption: "Breaking camp"

  - id: day6
    type: map
    heading: "Long Miles"
    subheading: "July 24 — Day 6"
    text: |
      The valley widened and the route became easier. The wider river reduced the entrapment risk, and the sweepers were easier to avoid.

      The map showed a significant ridge ahead. We made camp early to get a full night before the push.
    coordinates: [-154.143, 67.555]
    zoom: 10
    pitch: 35
    bearing: 35
    routeProgress: 0.60
    align: right

