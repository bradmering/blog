      - src: "/images/great-wheel/IMG_8449.webp"
        caption: "At the high point — 1,059m before the final push to the summit"

  - id: descent
    type: map
    heading: "The Descent"
    subheading: "July 25–26 — Back to the valley"
    text: |
      The descent took most of the afternoon — loose scree, then gravel fans, then tundra. We were moving toward the extraction point now. The math had shifted from *how far* to *how long*.

      We made the valley floor by evening and camped on the first flat ground we found.
    coordinates: [-153.937, 67.504]
    zoom: 11
    pitch: 45
    bearing: 10
    routeProgress: 0.82
    align: right

  - id: descent-gallery
