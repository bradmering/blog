  - id: day3-muskoxen
    type: parallax-video
    src: "/videos/stories/brooks-range/IMG_2037.mp4"
    caption: "The Okpilak valley and the muskox herd"
    align: left
    subheading: "July 4 — Day 3"
    heading: "The Battle"
    text: |
      The herd, present through the afternoon on the sandbar below us, had moved back down the valley, back to the sheet ice below. As we got ready for bed, two large male muskoxen came up the valley. Without warning, just below us, one turned and charged the other. The other pivoted to catch the coming blow. You could feel the crack from a thousand feet away.

      For five minutes they charged, backing up while swinging their massive heads, and then charging again. Sometimes, they locked horns and pushed, trying to throw the other like a sumo wrestler. We sat in rapt attention, watching this fight play out, until one threw the other sideways, and the battle was over. The winner, and there was clearly a winner, turned and walked back down the valley. The loser stood up, ate some grass, and then followed the other back down the valley.

  - id: day4
    type: article
    heading: "To the Okpilak Headwaters"
    subheading: "July 5 — Day 4"
    text: |
      We woke up excited to explore. Still sore from the hard carry, but the river was calling. We loaded packs with just rafting gear and hiked up river. After the 70lbs pack the day before, just carrying a boat and drysuit felt like nothing. We saw a wolverine print, caribou and muskox, and wolf tracks, but no sign of bears.

      About five miles up we ran into a stream flowing off the Esetuk, too fast and deep to cross down low. We turned up the creek and found a spectacular cascade — a 40 foot drop through a narrow slot — and took a side mission over the waterfall to avoid the crossing.

      As we approached the headwaters, the Okpilak funneled into a tight, steep canyon — sustained, committing class 4 with holes and potential pins. As much fun as it looked, it was well out of our safe range in far north Alaska. Losing a boat, a minor injury, even damage to gear could make for a serious rescue. So we hiked to the confluence, looked around, and hiked back below the canyon to put in below the most committing section.

    heroImage:
