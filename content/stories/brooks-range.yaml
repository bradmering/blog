  - id: wolverine
    type: parallax-video
    layout: split
    src: "/videos/stories/brooks-range/IMG_2159.mp4"
    caption: "A wolverine, checking us out"
    align: right
    subheading: "July 6 — Day 5"
    heading: "A wolverine came to visit"
    text: |
      A rare sight, even here - solitary and secretive. We thought we had seen prints yesterday, but as we sat and watched the muskoxen, a wolverine ran down from the low ridge on our right, and cruised across the sandbar.

      He was bigger than I expected, moving fast with long loping strides. He was uninterested in us, using the sandbar as a highway, moving down the valley, and across the river, and out of sight.

  - id: day6a
    type: article
    heading: "Daughter of Gallahop Ridge"
    subheading: "July 7 — Morning"
    text: |
      Yesterday was a full day of nothing. We watched wildlife, the muskoxen stopped by again, we soaked in the hotsprings, patched drysuits and boats, ate snacks, smacked mosquitos.

      Mark and I felt a need for a quick romp up the beautiful ridge above us before sitting in boats all day — an early morning scramble up sustained talus and neat shale ridges to the knife edge. I named the ridge after Bluey's chess pieces.

      The ridge was steep and loose, and despite moving away from the marshy valley, the mosquitoes were persistant.  We made it high on the ridge, just below the point at which it looked to turn technical before running out of time and hustling back down to camp, the boats, and the waiting river.
    heroImage:
      src: "/images/stories/brooks-range/IMG_2187.webp"
      caption: "A muskox horn, the ridge behind"
    coordinates: [-144.033, 69.333]
    zoom: 12
