  - id: day7-portage
    type: parallax-video
    src: "/videos/stories/brooks-range/IMG_2306.mp4"
    caption: "Walls of ice as we near the sea"
    align: left
    subheading: "July 9"
    heading: "Walls of ice and a muddy river"
    text: |
      We're approaching the arctic ocean, the river squeezed between walls of ice, the wind rising, the sun baking us. Sheet ice is still attached to the permafrost, towering above our boats.  In places it had caved off into the river, but the channels were fast and deep enough.  

  - id: day7-portage
    type: article
    heading: "Portage to the Lagoon"
    subheading: "July 9 — Day 7 continued"
    text: |
      That went as well as it was going to go. A slog under big, poorly balanced loads, dragging boats behind us, but we'd arrived at the edge of the earth — only sea and ice stretching north, Kaktovik oddly visible in the heat-distorted distance.

      We loaded up quick unsteady packs and dragged our boats over marshy palsa ground — hexagonal polygons formed by freeze-thaw cycles on the peat above permafrost, swamps in the middle waist deep in places. Only a mile carry, but I was ready to be done.

      Now properly in polar bear country, we set up the bear fence we'd carried the whole way — didn't inspire much confidence, but we passed the bright night unmolested. In the morning we watched a herd of caribou running across Arey Island in the distance, which we took as a good sign that no bears were around.
    heroImage:
      src: "/images/stories/brooks-range/IMG_2330.webp"
      caption: "Dragging boats across the palsa ground"
