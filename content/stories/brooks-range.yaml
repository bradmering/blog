  - id: day2
    type: article
    heading: "To the Esetuk Glacier"
    subheading: "July 3 — Day 2"
    text: |
      This morning I got the first indication I had failed to pack appropriately for this trip, as I struggled to attach everything to my backpack and then struggled to stand up under the weight. Last night I confidently predicted we could hold 3 miles an hour. Under this load, over this terrain, holding one mile an hour seemed difficult.

      Our route started up a shallow reentrant, two streams rolling down through tussocks and marsh grass. Rain started around 10 and persisted on and off all day. I was struggling with the weight, the grade, my poorly organized pack, and the marshy terrain. After two marshy climbs we gained a shallow rocky ridge and a beautiful marshy meadow, and managed to push through a bit faster.

      We stopped for lunch on an old moraine, looking across the steep valley carved by the west fork of the Esetuk creek. The cold rain had turned to light sleet, and we huddled behind a rock to eat. From above the passage down into the deep river cleft and back out looked very difficult, to say nothing of crossing the torrent. Both sides appeared to be steep granite talus.
      
      It proved less difficult than we thought — the wet, steep talus went slowly but was shorter than it looked, with only a couple small slides. We found a bench at the bottom, a set of terraced platforms that carried us to the stream. From the ridge, we had espied a wider section - where 4 braids branched off, and where the rushing glacial melt was only knee deep. The crossing went smoothly, and the opposite side, while slow, was marshy and less steep.

      A broad tundra meadow opened on the other side, leading to the east fork. Here we could follow the meadows just above the stream. As we climbed the tundra gave way to moraine, with smaller and smaller patches of marsh, and the fork turned into a shallow creek. The rain slackened as we reached the last patch of soft ground. We had held a little less than a mile per hour, but this seemed like the most protected camp we would find before the glacier. We were glad to drop packs, and dry out in the tents.
    heroImage:
      src: "/images/stories/brooks-range/IMG_1846.webp"
