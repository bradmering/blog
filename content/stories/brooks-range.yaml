  - id: day7-sea
    type: article
    heading: "To the Sea"
    subheading: "July 8 — Day 7"
    text: |
      I woke to more sun, lips badly burned from yesterday. But this was the day — to the Arctic Ocean. Excitement and fear mingled as we fought the waves of mosquitos. Today was the day into the unknown. Polar bears, sea ice, swampy portages, mud flats that trap boats, flat river and hard paddling, open water and barrier islands.

      The water started fast, still dropping well even at 500 feet above sea level. The first ten miles were still class 1/2 and fun, rapids spacing out into slow braided paddling. We started early, hoping to beat the afternoon wind. As we dropped, the flowers changed — purples and reds giving way to tiny white and yellow, the silt turning brown as glacial melt diluted with marshy inflows.

      At 20 miles we called a lunch break on a bluff, and could see our first hint of human habitation — a white tower on the horizon toward Kaktovik, weirdly distorted, that looked 40 feet tall. It seemed so close, but we knew we were more than 30 miles from the town. It seemed odd to see any manmade structure, much less something so large.
      
      The next ten miles passed slowly, wind rising, waters languid. Finally we guessed we were close to the spit, where the Hula and the Okpilak both empty into the Beaufort. Here the work of the day would begin in earnest, portaging across the lowlands to the edge of the lagoon.
    heroImage:
      src: "/images/stories/brooks-range/IMG_2322.webp"
      caption: "Massive ice wall, the river squeezed alongside"
