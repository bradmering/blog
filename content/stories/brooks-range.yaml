  - id: day8
    type: article
    heading: "Across the Lagoon to Barter Island"
    subheading: "July 9–10 — Day 8"
    text: |
      We rose early to beat the wind. Packrafts aren't made for open water, but the lagoon isn't open sea, so we hoped for smooth passage. The lagoon was beautiful, ice shimmering on the horizon. As the temp rose, so did the ice wall in the distance and shimmering buildings to our left — a mirage. 
      
      Fata Morgana — I'd heard of it before, old books, ships seeing towering icebergs over the horizon, but we stared at those things for two days before realizing it was an illusion. The tower we could see 40 miles off was no more than 12 feet tall.

      It also made guessing distance impossible. The barrier island looked close, but we paddled for hours. We ran into one of the mud flats I'd been dreading — only a foot or two deep, still well frozen — and lined our boats about a mile, walking in the Arctic Ocean.

      Three more miles took us to the barrier island, windswept and barren, driftwood and whale bones from the whale hunts of Kaktovik. We huddled out of the wind, ate lunch, then launched back out across the Kuvritovik Entrance and found a sheltered beach near the Kaktovik airstrip, watching caribou play on the bluff behind our tents.

      We packed the next morning, the last carry to the airport — just two flat miles, but I was glad to be done. It was weird to walk on a road after nine days of slow arctic travel. We toured Kaktovik, bought soda and fig newtons, and caught our flight — delayed, but the pilot flew us back up the Okpilak valley, a real treat seeing the sweep we'd just covered from the air. Then we were back in the world, connected again to the internet, to life, to other people — bittersweet.

      Without a doubt one of the best trips of my life, everything I was hoping for.
