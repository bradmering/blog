  - id: day6b
    type: article
    heading: "To the Coastal Plain"
    subheading: "July 7 — Afternoon"
    text: |
      Today we headed towards something new. In the ten years I've been planning this trip, this is the part I was most looking forward to — the river carrying us past the edge of the glacial valley, down the steep drop that guards the flat U, and out onto the coastal plain: the coast of the Beaufort Sea, still covered in ice, patrolled by polar bears, the Arctic Ocean beyond.

      We launched off, fast splashy rock-gardens for the first four miles, then long flat braided sections where we were often out of the boats, lining through. Then the river rounded the trough head and dropped again — unbelievably good, continuous class 3, fast drops and clean lines and great wave trains, lasting for the next 20 miles. If this river was outside of Pittsburgh, tourists would pay good money, and it would see dozens of laps a day. 

      As we dropped away, the range unfolded behind us — the Eastern Brooks Range stretched out, a sweep of jagged overlapping peaks, true big sky country. The wind blew constantly from the north, cutting across fields of wildflowers, purple and red clusters, tiny white dew drops, explosions of deep blue. The braids carried us to the left and right of the wide course. As the water carried us to the edges of the river, the wind carried the smell of the flowers, changing subtly as each patch of color passed. Then the course would turn north, and the wind turned colder, blowing off the ice, carrying the smell of salt.

      As we paddled, we grew worried about access to water. The Okpilak, like the other main rivers, is glacially fed, white with silt. In the high peaks, we could find streams, filtered through rocks and marshes, fresh snowmelt without silt. But here, the river could only be used after filtering, risking clogging our filters.

      We finally found a nice flat bench to camp and dug a small well in the marshy soil for water. The well filled with a green, marshy water, but we could boil and filter it.
      
      This was a hard camp. In the mountains, the sun would dip behind the ridges, giving us a respite from the never ending day. Out here, the sun wheeled around us, tents baking in the sun. The breeze had died, and the mosquitoes were thick on the tents. We lay, unsleeping, listening to the water, until after midnight a rising breeze cooled the camp and brought sleep.
    heroImage:
      src: "/images/stories/brooks-range/IMG_2201.webp"
      caption: "Continuous class 3, dropping toward the plain"
