  - id: day3
    type: article
    heading: "Over the Esetuk Glacier to the Okpilak Valley"
    subheading: "July 4 — Day 3"
    text: |
      Today, we discovered the way of the caribou.

      We woke to light rain and spots of sun. I got my pack better balanced and we started the grind up to the toe of the glacier. The clouds began to clear, and we could see the fierce beauty of the Romanzof Range, jagged shale cut through with huge rolling glaciers.

      After 3 hard miles, we reached the toe of the Esetuk Glacier - a massive rolling spike of glacier, dropping down a thousand feet to the moraine below. Mark and I both looked at the glacier, and started to speculate about holding the high line, up and over the flat plateau, avoiding the long drop and climb on the other side.

      We had minimal glacier gear — paddles as ice axes, microspikes, throw lines as handlines. Melissa looked at the crossing and said "fuck no." This was the right decision. As we looked at the map, rather than following Luc's track, we could hold the course that the creek followed off this toe, and contour out to the Okpilak valley, just 3 miles down river of our target camp.

      The snow crossing was serious, but uneventful, with soft snow, and then sharp, shale talus. At the bottom was a long snowfield, covered in debris caved off as the glacier receded.  This was probably the most dangerous portion of the whole trip, and I was glad to be done with it. 

      We hiked down into a creek dark orange with rusting iron flowing off the talus, and discovered the way of the caribou — their weaving social trails, excellent at finding the path of least resistance through hard terrain, knowing about the cliffs and deep pools and swamps we'd have blundered into on our own. At one point, I tried to hold the high line, and cliffed out on steep shale. I cut myself up descending back to the river. From that point on, it became a running line - "return to the way of the caribou".

      Finally, six miles in, we rounded the last bend of the slot canyon and the Okpilak valley stretched out in front of us. About half way down, Mark spotted what he thought was a bear booking across the gravel — a large muskox, first of a whole herd that had taken up residence in the valley. We hiked across sheet ice, keeping our distance, to the hot springs and camp.

      The hot springs were everything we'd hoped — three pools of descending heat, the top impossibly warm, the bottom perfect for soaking in. 
