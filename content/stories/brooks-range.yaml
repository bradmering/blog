  - id: paddling-upper-waters
    type: parallax-video
    src: "/videos/stories/brooks-range/IMG_6685.mp4"
    caption: "Paddling the upper Okpilak"
    align: right
    subheading: "July 5 — Day 4"
    heading: "Paddling the Upper Waters"
    text: |
      What followed was wildly fun — sustained fast class 3, one rock garden after another. Mark took a swim and Melissa did well to stay in the boat. Close to camp I caught a rock under my boat, went high side, and got swept out of reach of it myself, pin-balling against the rocks for 200 feet before getting braced against something. I came away unscathed, but my drysuit booties were a bit worse for wear.

      We rolled back into camp resolved that tomorrow would be a rest day — soaking in hotsprings, fixing drysuits, patching boats, recovering a bit.

  - id: day5
    type: article
    heading: "Do the Muskoxen Practice Religion?"
    subheading: "July 6 — Rest Day"
    text: |
      Despite the wildness of this place, the actual wildlife can be hard to see. Part of it is because the animals don't see humans very often and run away when they do. Part of it is how vast the space is, and how difficult survival can be. But today I realized it's also because of how we move through this space — too fast, always heading to the next spot. This is especially true in the boats, down low in the waters, focused on the next rapid, hurried along by the current.

      Today we stopped and watched. Boats needed patching, drysuits needed major work, and I think we all needed a day of just sitting. My right bootie wasn't bad, just a small tear, but the left was catastrophic — I made a barrier out of Tyvek tape and seam seal that I could get my foot into, still largely water resistant.

      As we ate breakfast, the resident muskox herd came back up the valley and kept coming, closer and closer, until they reached the hotsprings right by our camp and stopped — rubbing against the rocks, drinking the mineral water, lying in the grass. The patriarch, for surely he was - a mighty bull at least twice the size of the rest - stayed on the sandbar, while his herd came up to the springs.  A baby calf stayed in the middle, while they lay in the grass, nibbling on the spiky grasses.

      They stayed with us for an hour, and then the patriarch made a move up towards them, and they all, almost as one, started back down towards the sandbar.  By evening they were far down the valley, specks on the sheet ice 2 miles down. 
    heroImage:
      src: "/images/stories/brooks-range/IMG_2184.webp"
