chapters:
  - id: title
    type: title
    heading: "From the Hulahula to the Arctic Ocean"
    subheading: "A packrafting expedition from the headwaters of the Hulahula River, across the Romanzof Mountains, down the Okpilak River, out to the Beaufort Sea and the Arctic Ocean"
    image: "/images/stories/brooks-range/IMG_2060.webp"
    text: |

      I had been planning some variation of this trip for almost 10 years - an expedition style packraft, starting high in the brooks range, crossing over the range, and rafting out to the arctic ocean.  I wanted to do something rarely done, committing and isolated. And I wanted to go to the sea - to see the vast stretch of sea ice, to camp in proper polar bear country.

      Our initial plan was to hire a bush plane out of Fairbanks to Grassers Airstrip on the Hulahula, spend a couple days exploring the headwaters up to the glacier and the divide before putting on the river. From there it was about 85 miles to the Beaufort Sea.

      The paddling would start as shallow, narrow creeking, deepening as tributaries fed the stream through the Franklin Range. We planned to exit the river at Kaktovik, a small Inupiaq village on the coast of the Beaufort Sea. Beyond that, we had only a rough sketch of a plan, 10 days of food, fuel, boats, and the vast, trackless wilderness of the North Slope.  

      I had never been north of the Brooks Range before, never seen more than a glimpse of what lay beyond the river valleys and mountains of the peaks. This trip was going to be the fulfilment - point to point expedition, glacier to sea, with map and compass, beneath the unsetting sun. 

  - id: fairbanks
    type: map
    heading: "Fairbanks"
    subheading: "July 1 — Staging"
    text: |
      I arrived in Alaska a day ahead. I spent the day walking across town to various shops - bear spray, fuel, flare gun, air horn, tacos! Tomorrow morning we leave at 6am, flying a bush plane from Fairbanks to Grassers Airstrip on the Hulahula.
    coordinates: [-147.716, 64.838]
    zoom: 10
    pitch: 30
    align: left

  - id: day1
    type: article
    heading: "Hula Hula River"
    subheading: "July 2 — Day 1"
    text: |
      The whole way north Kirk, our bush pilot, regaled us with stories of North Alaska. The conversation ranged widely — philosophy, education, politics, literature — but always returned to stories of Alaska, its people, its mountains and rivers, its bears, muskox, dall sheep, and golden eagles. The north slope of the Brooks Range is a wilderness like few remaining places.

      The Eastern Brooks Range is perhaps the most impressive section of the range, holding the highest peaks (Isto, Chamberlain, Michelson) and the largest collection of glaciers. The mountains host deep glacial valleys, and the rock — limestone, shale, and granite — creates jagged sharp ridges and peaks.

      Our plan was to start at the headwaters of the Hulahula, a relatively popular rafting line known for its class 3 canyon as you exit the glacial valley onto the coastal plain. We'd read a report from Luc Mehl about a crossing from the Hula, under Mount Michelson, across the toe of the Esetuk Glacier, and arriving at the Okpilak that way. Somehow on the flight, we talked ourselves into following Luc's course, despite widespread agreement that following Luc wasn't always wise.

      The flight over the southern range was spectacular, over the Continental Divide. Rivers south of the divide largely flow west to the Pacific Ocean. As we cross the divide, we passed into the domain of the Arctic, with the powerful, glacial fed rivers sweeping north to the Beaufort Sea and the arctic.
      
      As the plane was landing, we had already talked ourselves into following Luc's course, seeking the remoteness of the Okpilak valley. The idea of carrying up and over the Romanzof sounded totally reasonable in the warm valley. We packed our gear in the boats, and set off downriver. The Hula was wonderful — 20 spectacular miles of splashy class 2. Halfway down we saw several eagles circling a recent caribou carcass. Clear grizzly sign abounded, but we didn't see any bears.

      We made camp on a bluff above the river, below a broad reentrant that would serve tomorrow as our course up towards the Esetuk glacier and the Okpilak valley. Our first night of the midnight sun passed quietly, the sun dipping behind the ridge only to reemerge just after 4am.
    heroImage:
