chapters:
  - id: title
    type: title
    heading: "Canning River"
    subheading: "Seven days through the Arctic National Wildlife Refuge"
    image: "/images/canning-river/IMG_0641.webp"
    text: |
      The Canning River originates in the Philip Smith Mountains at the eastern edge of the Brooks Range, drains north across the Arctic National Wildlife Refuge, and empties into the Beaufort Sea near the Alaska–Yukon border. I got to share it with my Dad, sister Liz, and my friend Chris.

  - id: headwaters
    type: map
    heading: "The Headwaters"
    subheading: "June 26 — 68.7°N, 1,360m"
    text: |
      We stepped off the de Havilland Beaver onto a gravel bar at 1,360 meters, packs thudding against the tundra. The Canning unwound above us in a braided silver thread, cutting between walls of schist that rose 300 meters on either side.

      No trails. No other parties. Just the sound of water finding its way north.
    coordinates: [-146.185, 68.718]
    zoom: 11
    pitch: 50
    bearing: -15
    routeProgress: 0.06
    marker: true
    align: left

  - id: headwaters-gallery
    type: gallery
    layout: duo
    images:
      - src: "/images/canning-river/IMG_0452.webp"
        caption: "The put-in at 1,360m — the highest point of the trip"
      - src: "/images/canning-river/IMG_0444.webp"
        caption: "Looking downstream into the upper canyon"

  - id: first-day-lower
    type: map
    heading: "First Miles"
    subheading: "June 26 — Into the valley"
    text: |
      The first day we carried up river, looking for the headwaters and a good spot to camp.  The river was fast and once we were on it we'd fly down river.  There was no need to hurry.  We forded the river, then headed upstream to a beautiful campsite on a ridge above the river. Ch
    coordinates: [-146.149, 68.726]
    zoom: 12
    pitch: 45
    bearing: 10
    routeProgress: 0.18
    align: right

  - id: first-day-image
    type: image
    image: "/images/canning-river/IMG_0473.webp"
    caption: "Evening light on the upper valley walls, day one"

  - id: second-day
    type: map
    heading: "Downstream"
    subheading: "June 27 — Day 2"
    text: |
      A grizzly and two cubs crossed ahead of us in the morning, unhurried. The mother paused on the far bank, nose tilted into the wind, then moved into the willows without looking back.

      We held our paddles still and let the current carry us past.
    coordinates: [-146.073, 68.794]
    zoom: 11
    pitch: 40
    bearing: -25
    routeProgress: 0.32
    marker: true
    align: left

  - id: ridge-pano
    type: image
    image: "/images/canning-river/IMG_0641.webp"
    caption: "The ridge at 1,332m — looking north across the coastal plain toward the Beaufort Sea"

  - id: ridge
    type: map
    heading: "The High Ridge"
    subheading: "June 27 — 1,332m"
    text: |
      We'd climbed 500 meters off the river into a silence that felt geologic. The ridge connected two unnamed peaks and looked north across terrain so flat it bent at the edges with the **curvature of the earth**.

      Weather systems were stacking out over the Beaufort. We could see them from here — grey columns of cloud sixty miles away, moving slow.
    coordinates: [-146.123, 68.825]
    zoom: 12
    pitch: 55
    bearing: 35
    routeProgress: 0.42
    marker: true
    align: right

  - id: day3-image
    type: image
    image: "/images/canning-river/LIZ70431.webp"
    caption: "On the ridge above camp, day two"

  - id: foothills
    type: map
    heading: "Into the Foothills"
    subheading: "June 28 — Day 3"
    text: |
      The character of the river changed around noon. Canyon walls fell back, the gradient eased, and the Canning spread into braids three hundred meters wide. Geese fed in the shallows. The Brooks Range was behind us now.

      We were moving into older, softer country.
    coordinates: [-146.046, 68.839]
    zoom: 10
    pitch: 35
    bearing: 15
    routeProgress: 0.50
    marker: true
    align: left

  - id: foothills-article
    type: article
    blocks:
      - text: |
          ## Days Four and Five

          The river went quiet on day four. We were deep in the foothills transition zone — too far from the mountains to feel their scale, not yet close enough to the coast to sense the sea. The tundra was green and waterlogged, cut by oxbow ponds that reflected a sky that never fully darkened.
      - image: "/images/canning-river/LIZ80600.webp"
        caption: "Afternoon light on the tundra, day four"
        align: right
      - text: |
          Day five brought the first real headwind. We paddled from seven in the morning until the light shifted gold around ten at night, covering thirty kilometers against a cold north breeze that smelled faintly of ice and open ocean.

          The others spotted a wolf on a gravel bar. I was looking at my compass and missed it — one of those small trip regrets that never entirely goes away. That evening we found a dry camp on a low ridge and made the first hot meal in two days.

  - id: coastal-plain
    type: map
    heading: "The Coastal Plain"
    subheading: "June 30 — 69.1°N, 450m"
    text: |
      We crossed into the coastal plain sometime around midnight, though it was still full light. The sun circled low without setting.

      The tundra stretched in every direction without feature. The river had slowed almost to nothing — we paddled more than floated, watching the compass more than the banks.
    coordinates: [-145.877, 69.149]
    zoom: 10
    pitch: 20
    bearing: 5
    routeProgress: 0.65
    marker: true
    align: right

  - id: plain-image
    type: image
    image: "/images/canning-river/IMG_0797.webp"
    caption: "The coastal plain at 69°N — the landscape flattens completely"

  - id: final-approach
    type: map
    heading: "The Final Miles"
    subheading: "July 1 — 69.2°N"
    text: |
      We could smell the sea before we could see it — a cold, clean salt smell cutting through the sweetness of the tundra. The lagoon appeared as a silver line on the horizon.

      Eight more kilometers. We paddled.
    coordinates: [-145.910, 69.220]
    zoom: 11
    pitch: 25
    bearing: 20
    routeProgress: 0.82
    marker: true
    align: left

