  - id: journey-end
    type: map
    heading: "Journey's End"
    subheading: "July 2 — 69.3°N, 372m"
    text: |
      The final morning was eight hours against a headwind on the coastal lagoon, spray in our faces, the Arctic Ocean grey and indistinguishable from the overcast above it.

      We made the pickup strip on the last of our energy. The Beaver banked over the ANWR boundary on the way out and we looked down at the river we'd just floated — **a thin silver line in all that emptiness**.
    coordinates: [-146.037, 69.287]
    zoom: 12
